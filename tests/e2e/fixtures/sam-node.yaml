apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-node
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sam-node
  template:
    metadata:
      labels:
        app: sam-node
    spec:
      serviceAccountName: sam-node-sa
      containers:
      - name: sam-node
        image: sam-node:local
        command: ["/sam-node", "run"]
        args:
        - "--hub"
        - "http://sam-hub.default.svc.cluster.local:9090"
        - "--jwt-path"
        - "/var/run/secrets/tokens/sam-token"
        - "--api-token"
        - "secret-token"
        - "--allow-loopback"
        volumeMounts:
        - name: sam-token
          mountPath: /var/run/secrets/tokens
          readOnly: true
      volumes:
      - name: sam-token
        projected:
          sources:
          - serviceAccountToken:
              path: sam-token
              expirationSeconds: 3600
              audience: "sam-mesh-audience"
