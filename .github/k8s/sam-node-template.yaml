apiVersion: v1
kind: ConfigMap
metadata:
  name: sam-canary-config-${ENV_NAME}
  namespace: sam-canary-${ENV_NAME}
data:
  sam-node.yaml: |
    version: "v1alpha1"
    attenuation:
      policies: []
      checks: []
      rules: []
    services:
      - type: mcp
        name: dummy-http
        description: "Canary HTTP tool (k8s agnhost)"
        # agnhost netexec responds with request info on the root path
        target_url: "http://localhost:9090/"
      - type: mcp
        name: dummy-stdio
        description: "Canary Stdio tool via injected busybox"
        # We call the injected busybox binary explicitly
        command: ["/shared/busybox", "sh", "-c", "while read line; do echo '{\"jsonrpc\": \"2.0\", \"id\": 1, \"result\": {\"status\": \"canary-alive\"}}'; done"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sam-node-sa
  namespace: sam-canary-${ENV_NAME}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-canary-${ENV_NAME}
  namespace: sam-canary-${ENV_NAME}
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sam-canary-${ENV_NAME}
  template:
    metadata:
      labels:
        app: sam-canary-${ENV_NAME}
    spec:
      serviceAccountName: sam-node-sa
      # 1. The Init Container: Copies busybox to the shared volume
      initContainers:
      - name: inject-busybox
        image: busybox:1.36.1
        command: ["cp", "/bin/busybox", "/shared/busybox"]
        volumeMounts:
        - name: shared-bin
          mountPath: /shared

      containers:
      # 2. The SAM Agent (Distroless)
      - name: sam-node
        image: ghcr.io/google/sam-node:${IMAGE_TAG}
        args: 
          - "run"
          - "--config=/etc/sam/sam-node.yaml"
          - "--hub=http://sam-hub-internal-${ENV_NAME}.sam-${ENV_NAME}.svc.cluster.local"
          - "--jwt-path=/var/run/secrets/tokens/sam-token"
          - "--api-token=secret-token"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: config-volume
          mountPath: /etc/sam
        - name: shared-bin
          mountPath: /shared
        - name: sam-token
          mountPath: /var/run/secrets/tokens
          readOnly: true
          
      # 3. The Dummy MCP Backend Sidecar
      - name: mock-mcp-server
        image: registry.k8s.io/e2e-test-images/agnhost:2.39
        # agnhost's netexec subcommand spins up a robust test HTTP server
        args: ["netexec", "--http-port=9090"]
        ports:
        - containerPort: 9090
          
      volumes:
      - name: config-volume
        configMap:
          name: sam-canary-config-${ENV_NAME}
      - name: shared-bin
        emptyDir: {}
      - name: sam-token
        projected:
          sources:
          - serviceAccountToken:
              path: sam-token
              expirationSeconds: 3600
              audience: "sam-hub-audience"
