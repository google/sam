apiVersion: v1
kind: ConfigMap
metadata:
  name: sam-canary-config-${ENV_NAME}
  namespace: sam-canary-${ENV_NAME}
data:
  sam-node.yaml: |
    version: "v1alpha1"
    attenuation:
      policies: []
      checks: []
      rules: []
    services:
      - type: mcp
        name: dummy-http
        description: "Canary HTTP tool (k8s agnhost)"
        # agnhost netexec responds with request info on the root path
        target_url: "http://localhost:9090/"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sam-node-sa
  namespace: sam-canary-${ENV_NAME}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-canary-${ENV_NAME}
  namespace: sam-canary-${ENV_NAME}
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sam-canary-${ENV_NAME}
  template:
    metadata:
      labels:
        app: sam-canary-${ENV_NAME}
    spec:
      serviceAccountName: sam-node-sa
      containers:
      - name: sam-node
        image: ghcr.io/google/sam-node:${IMAGE_TAG}
        args: 
          - "run"
          - "--config=/etc/sam/sam-node.yaml"
          - "--hub=https://${ENV_NAME}.sam-mesh.dev"
          - "--jwt-path=/var/run/secrets/tokens/sam-token"
          - "--api-token=secret-token"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: config-volume
          mountPath: /etc/sam
        - name: shared-bin
          mountPath: /shared
        - name: sam-token
          mountPath: /var/run/secrets/tokens
          readOnly: true
      - name: mock-mcp-server
        image: registry.k8s.io/e2e-test-images/agnhost:2.39
        # agnhost's netexec subcommand spins up a robust test HTTP server
        args: ["netexec", "--http-port=9090"]
        ports:
        - containerPort: 9090
      volumes:
      - name: config-volume
        configMap:
          name: sam-canary-config-${ENV_NAME}
      - name: shared-bin
        emptyDir: {}
      - name: sam-token
        projected:
          sources:
          - serviceAccountToken:
              path: sam-token
              expirationSeconds: 3600
              audience: "sam-hub-audience"
