apiVersion: v1
kind: Service
metadata:
  name: sam-control-plane-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: sam-control-plane-${ENV_NAME}
---
apiVersion: v1
kind: Service
metadata:
  name: sam-db-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: sam-db-${ENV_NAME}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sam-db-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  serviceName: sam-db-${ENV_NAME}
  replicas: 1
  selector:
    matchLabels:
      app: sam-db-${ENV_NAME}
  template:
    metadata:
      labels:
        app: sam-db-${ENV_NAME}
    spec:
      securityContext:
        fsGroup: 999
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_DB
          value: sam_mesh
        - name: POSTGRES_USER
          value: sam
        - name: POSTGRES_PASSWORD
          value: sam-secret-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
          protocol: TCP
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: db-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-control-plane-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sam-control-plane-${ENV_NAME}
  template:
    metadata:
      labels:
        app: sam-control-plane-${ENV_NAME}
    spec:
      initContainers:
      - name: wait-for-db
        image: busybox:1.36.1
        command: ['sh', '-c', 'until nc -z -w3 sam-db-${ENV_NAME} 5432; do echo waiting for db; sleep 1; done']
      containers:
      - name: sam-control-plane
        image: ghcr.io/google/sam-control-plane:${IMAGE_TAG}
        env:
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: sam-control-plane-secret-${ENV_NAME}
              key: admin-token
              optional: true
        ports:
        - containerPort: 8080
          protocol: TCP
          name: http
        readinessProbe:
          httpGet:
            path: /info
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /info
            port: http
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
        args:
        - "--bind-address=0.0.0.0:8080"
        - "--db-driver=postgres"
        - "--db-dsn=postgres://sam:sam-secret-password@sam-db-${ENV_NAME}:5432/sam_mesh?sslmode=disable"
        - "--issuer=https://auth.sam-mesh.dev,https://container.googleapis.com/v1/projects/${GCP_PROJECT_ID}/locations/${CLUSTER_REGION}/clusters/${CLUSTER_NAME}"
        - "--allowed-audiences=sam-mesh-audience,sam-hub-audience"
        - "--admin-token=$(ADMIN_TOKEN)"
        - "--auto-approve-enrollment"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: sam-control-plane-healthcheck-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /info
  targetRef:
    group: ""
    kind: Service
    name: sam-control-plane-${ENV_NAME}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: sam-control-plane-gateway-${ENV_NAME}
  namespace: ${NAMESPACE}
  annotations:
    networking.gke.io/certmap: sam-hub-cert-map-${ENV_NAME}
spec:
  gatewayClassName: gke-l7-global-external-managed
  addresses:
  - type: NamedAddress
    value: sam-hub-ip-${ENV_NAME}
  listeners:
  - name: https
    protocol: HTTPS
    port: 443
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sam-control-plane-route-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  parentRefs:
  - name: sam-control-plane-gateway-${ENV_NAME}
  hostnames:
  - "${ENV_NAME}.sam-mesh.dev"
  rules:
  - matches:
    - path:
        type: Exact
        value: /register
    - path:
        type: Exact
        value: /info
    - path:
        type: Exact
        value: /keys
    - path:
        type: Exact
        value: /routers/lease
    - path:
        type: Exact
        value: /policies
    - path:
        type: Exact
        value: /enroll
    - path:
        type: Exact
        value: /enroll/status
    - path:
        type: Exact
        value: /refresh
    backendRefs:
    - name: sam-control-plane-${ENV_NAME}
      port: 8080
  - matches:
    - path:
        type: Exact
        value: /console
    filters:
    - type: RequestRedirect
      requestRedirect:
        path:
          type: ReplaceFullPath
          replaceFullPath: /console/
        statusCode: 302
  - matches:
    - path:
        type: PathPrefix
        value: /console/
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: sam-console-${ENV_NAME}
      port: 8081
