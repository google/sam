---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dex
  namespace: dex
---
# Custom Health Check configuration for the Google Cloud Load Balancer
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: dex-backend-config
  namespace: dex
spec:
  healthCheck:
    checkIntervalSec: 15
    port: 5556
    type: HTTP
    requestPath: /healthz
---
apiVersion: v1
kind: Service
metadata:
  name: dex
  namespace: dex
  annotations:
    # Bind the backend config to the service so the L7 Load Balancer uses /healthz
    cloud.google.com/backend-config: '{"default": "dex-backend-config"}'
spec:
  # Must be NodePort for GKE L7 Ingress to route to it
  type: NodePort
  ports:
  - name: dex
    port: 5556
    protocol: TCP
    targetPort: 5556
  selector:
    app: dex
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: dex
  labels:
    app: dex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      serviceAccountName: dex
      containers:
      - image: ghcr.io/dexidp/dex:v2.38.0
        name: dex
        command: ["/usr/local/bin/dex", "serve", "/etc/dex/cfg/config.yaml"]
        ports:
        - name: http
          containerPort: 5556
        volumeMounts:
        - name: config
          mountPath: /etc/dex/cfg
        env:
        # Dynamically pulls the values injected by your GitHub Actions pipeline
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: dex-secrets
              key: google-client-id
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: dex-secrets
              key: google-client-secret
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: dex-secrets
              key: github-client-id
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: dex-secrets
              key: github-client-secret
        - name: CLI_OAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: dex-secrets
              key: cli-oauth-secret
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5556
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: dex
          items:
          - key: config.yaml
            path: config.yaml
---
# Request a free, auto-renewing SSL certificate from Google
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: dex-cert
  namespace: dex
spec:
  domains:
    - auth.sam-mesh.dev
---
# The L7 Load Balancer
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dex-ingress
  namespace: dex
  annotations:
    networking.gke.io/managed-certificates: dex-cert
    # Tells GKE to attach the global static IP you reserved earlier
    kubernetes.io/ingress.global-static-ip-name: "auth-sam-mash"
spec:
  ingressClassName: "gce"
  rules:
  - host: auth.sam-mesh.dev
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: dex
            port:
              number: 5556
