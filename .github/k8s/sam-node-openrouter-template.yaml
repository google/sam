apiVersion: v1
kind: ConfigMap
metadata:
  name: sam-canary-openrouter-config-${ENV_NAME}
  namespace: sam-canary-${ENV_NAME}
data:
  sam-node.yaml: |
    version: "v1alpha1"
    attenuation:
      policies:
        - 'allow if service("inference", "openrouter");'
        - 'allow if service("system", "/sam/catalog");'
      checks: []
      rules: []
    services:
      - type: inference
        name: openrouter
        description: "OpenRouter Proxy Inference Service"
        target_url: "http://localhost:4000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openrouter-canary-${ENV_NAME}
  namespace: sam-canary-${ENV_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openrouter-canary-${ENV_NAME}
  template:
    metadata:
      labels:
        app: openrouter-canary-${ENV_NAME}
    spec:
      serviceAccountName: sam-node-sa
      containers:
      - name: openrouter-proxy
        image: ghcr.io/berriai/litellm:main-latest
        command:
          - "litellm"
          - "--model"
          - "openrouter/auto"
          - "--port"
          - "4000"
        env:
          - name: OPENROUTER_API_KEY
            value: "${OPENROUTER_API_KEY}"
        ports:
          - containerPort: 4000
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
      - name: sam-node
        image: ghcr.io/google/sam-node:${IMAGE_TAG}
        args: 
          - "run"
          - "--config=/etc/sam/sam-node.yaml"
          - "--hub=http://sam-hub-${ENV_NAME}.${NAMESPACE}.svc.cluster.local:9090"
          - "--jwt-path=/var/run/secrets/tokens/sam-token"
          - "--api-token=secret-token"
          - "--bind-addr=127.0.0.1:8080"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 500m
            memory: 128Mi
        volumeMounts:
        - name: config-volume
          mountPath: /etc/sam
        - name: sam-token
          mountPath: /var/run/secrets/tokens
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: sam-canary-openrouter-config-${ENV_NAME}
      - name: sam-token
        projected:
          sources:
          - serviceAccountToken:
              path: sam-token
              expirationSeconds: 3600
              audience: "sam-hub-audience"
