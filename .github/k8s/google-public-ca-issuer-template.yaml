apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: google-public-ca-issuer
  namespace: ${NAMESPACE}
spec:
  acme:
    server: https://dv.acme-v02.api.pki.goog/directory
    email: "${ACME_EMAIL}"
    privateKeySecretRef:
      name: google-ca-account-key
    externalAccountBinding:
      keyID: "${EAB_KEY_ID}"
      keySecretRef:
        name: google-ca-eab-secret
        key: secret
    solvers:
    - dns01:
        cloudDNS:
          project: ${GCP_PROJECT_ID}
