apiVersion: v1
kind: Service
metadata:
  name: sam-hub-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  type: LoadBalancer
  loadBalancerClass: "networking.gke.io/l4-regional-external"
  loadBalancerIP: ${LOAD_BALANCER_IP}
  allocateLoadBalancerNodePorts: false
  sessionAffinity: ClientIP
  externalTrafficPolicy: Local
  ports:
    - port: 443
      targetPort: 9090
      protocol: TCP
      name: register-https
  selector:
    app: sam-hub-${ENV_NAME}
---
apiVersion: v1
kind: Service
metadata:
  name: sam-hub-internal-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  ports:
    - port: 443
      targetPort: 9090
      protocol: TCP
      name: https
  selector:
    app: sam-hub-${ENV_NAME}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-hub-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sam-hub-${ENV_NAME}
  template:
    metadata:
      labels:
        app: sam-hub-${ENV_NAME}
    spec:
      containers:
      - name: sam-hub
        image: ghcr.io/google/sam-hub:${IMAGE_TAG}
        env:
        - name: SAM_HUB_KEY
          valueFrom:
            secretKeyRef:
              name: sam-hub-secret
              key: sam-hub-key
              optional: true # Make it optional so it doesn't block local kind testing if not created
        ports:
        - containerPort: 9090
          protocol: TCP
          name: metrics
        readinessProbe:
          httpGet:
            path: /healthz
            port: metrics
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: metrics
            scheme: HTTPS
          initialDelaySeconds: 15
          periodSeconds: 20
        args:
        - "--external-multiaddr=/dns4/${ENV_NAME}.sam-mesh.dev/tcp/443/wss"
        # 1. Trust Dex for humans/Google/GitHub. 2. Trust GKE for internal Canaries.
        - "--issuer=https://auth.sam-mesh.dev,https://container.googleapis.com/v1/projects/${GCP_PROJECT_ID}/locations/${CLUSTER_REGION}/clusters/${CLUSTER_NAME}"
        # 1. Dex CLI client ID. 2. Canary projected volume audience.
        - "--allowed-audiences=sam-mesh-audience,sam-hub-audience"
        - "--tls-cert-file=/etc/sam/certs/tls.crt"
        - "--tls-key-file=/etc/sam/certs/tls.key"
        - "--policy-file=/etc/sam/policies/policies.yaml"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/sam/certs
          readOnly: true
        - name: policies-volume
          mountPath: /etc/sam/policies
          readOnly: true
      volumes:
      - name: tls-certs
        secret:
          secretName: hub-sam-mesh-tls
      - name: policies-volume
        configMap:
          name: sam-hub-policies-${ENV_NAME}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sam-hub-policies-${ENV_NAME}
  namespace: ${NAMESPACE}
data:
  policies.yaml: |
    version: "v1alpha1"
    bindings:
      - user: "system:serviceaccount:sam-canary-${ENV_NAME}:sam-node-sa"
        role: "sam-canary"
    roles:
      sam-canary:
        mcp:
          allowed_tools:
            - "/sam/mcp/1.0.0"

---
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: sam-hub-monitor-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  selector:
    matchLabels:
      app: sam-hub-${ENV_NAME}
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: https
    tls:
      insecureSkipVerify: true
