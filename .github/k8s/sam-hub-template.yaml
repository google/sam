apiVersion: v1
kind: Service
metadata:
  name: sam-hub-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  clusterIP: None
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
    - port: 4501
      targetPort: 4501
      protocol: TCP
      name: p2p-tcp
    - port: 4501
      targetPort: 4501
      protocol: UDP
      name: p2p-udp
  selector:
    app: sam-hub-${ENV_NAME}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sam-hub-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  serviceName: "sam-hub-${ENV_NAME}"
  replicas: 3
  selector:
    matchLabels:
      app: sam-hub-${ENV_NAME}
  template:
    metadata:
      labels:
        app: sam-hub-${ENV_NAME}
    spec:
      containers:
      - name: sam-hub
        image: ghcr.io/google/sam-hub:${IMAGE_TAG}
        env:
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: SAM_HUB_KEY
          valueFrom:
            secretKeyRef:
              name: sam-hub-secret
              key: sam-hub-key
              optional: true # Make it optional so it doesn't block local kind testing if not created
        ports:
        - containerPort: 9090
          protocol: TCP
          name: metrics
        - containerPort: 4501
          hostPort: 4501
          protocol: TCP
          name: p2p-tcp
        - containerPort: 4501
          hostPort: 4501
          protocol: UDP
          name: p2p-udp
        readinessProbe:
          httpGet:
            path: /healthz
            port: metrics
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: metrics
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
        args:
        - "--listen=/ip4/0.0.0.0/tcp/4501"
        - "--listen=/ip4/0.0.0.0/udp/4501/quic-v1"
        - "--external-multiaddr=/dnsaddr/bootstrap.${ENV_NAME}.sam-mesh.dev"
        # 1. Trust Dex for humans/Google/GitHub. 2. Trust GKE for internal Canaries.
        - "--issuer=https://auth.sam-mesh.dev,https://container.googleapis.com/v1/projects/${GCP_PROJECT_ID}/locations/${CLUSTER_REGION}/clusters/${CLUSTER_NAME}"
        # 1. Dex CLI client ID. 2. Canary projected volume audience.
        - "--allowed-audiences=sam-mesh-audience,sam-hub-audience"
        - "--policy-file=/etc/sam/policies/policies.yaml"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: policies-volume
          mountPath: /etc/sam/policies
          readOnly: true
      volumes:
      - name: policies-volume
        configMap:
          name: sam-hub-policies-${ENV_NAME}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sam-hub-policies-${ENV_NAME}
  namespace: ${NAMESPACE}
data:
  policies.yaml: |
    version: "v1alpha1"
    bindings:
      - user: "system:serviceaccount:sam-canary-${ENV_NAME}:sam-node-sa"
        role: "sam-canary"
    roles:
      sam-canary:
        allowed_services:
          - "*:*"
        allowed_targets:
          - "*:*"
---
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: sam-hub-monitor-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  selector:
    matchLabels:
      app: sam-hub-${ENV_NAME}
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: sam-hub-healthcheck-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /healthz
  targetRef:
    group: ""
    kind: Service
    name: sam-hub-${ENV_NAME}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: sam-hub-gateway-${ENV_NAME}
  namespace: ${NAMESPACE}
  annotations:
    networking.gke.io/certmap: sam-hub-cert-map-${ENV_NAME}
spec:
  gatewayClassName: gke-l7-global-external-managed
  addresses:
  - type: NamedAddress
    value: sam-hub-ip-${ENV_NAME}
  listeners:
  - name: https
    protocol: HTTPS
    port: 443
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sam-hub-route-${ENV_NAME}
  namespace: ${NAMESPACE}
spec:
  parentRefs:
  - name: sam-hub-gateway-${ENV_NAME}
  hostnames:
  - "${ENV_NAME}.sam-mesh.dev"
  rules:
  - matches:
    - path:
        type: Exact
        value: /register
    - path:
        type: Exact
        value: /info
    backendRefs:
    - name: sam-hub-${ENV_NAME}
      port: 9090

