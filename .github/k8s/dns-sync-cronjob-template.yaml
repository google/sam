apiVersion: v1
kind: ServiceAccount
metadata:
  name: dns-sync-sa
  namespace: ${NAMESPACE}
  annotations:
    iam.gke.io/gcp-service-account: dns-cert-manager@${GCP_PROJECT_ID}.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dns-sync-role-${ENV_NAME}
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dns-sync-rolebinding-${ENV_NAME}
subjects:
- kind: ServiceAccount
  name: dns-sync-sa
  namespace: ${NAMESPACE}
roleRef:
  kind: ClusterRole
  name: dns-sync-role-${ENV_NAME}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dns-sync-cronjob
  namespace: ${NAMESPACE}
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: dns-sync-sa
          containers:
          - name: sync-dns
            image: google/cloud-sdk:latest
            command:
            - /bin/bash
            - -c
            - |
              set -e
              # Extract IPs and PeerIDs of pods running sam-hub
              echo "Finding sam-hub pods in ${NAMESPACE}..."
              PODS=$(kubectl get pods -n ${NAMESPACE} -l app=sam-hub-${ENV_NAME} -o jsonpath='{range .items[?(@.status.phase=="Running")]}{.metadata.name}{" "}{.spec.nodeName}{"\n"}{end}')
              
              declare -a IP_ARRAY=()
              
              while read -r pod node; do
                if [ -z "$pod" ]; then continue; fi
                echo "Checking pod: $pod on node: $node"
                IP_LIST=$(kubectl get node $node -o jsonpath='{.status.addresses[?(@.type=="ExternalIP")].address}')
                POD_IP=$(kubectl get pod $pod -n ${NAMESPACE} -o jsonpath='{.status.podIP}')
                
                if [ -n "$IP_LIST" ]; then
                  echo "Found IP $IP_LIST "
                  for ip in $IP_LIST; do
                    IP_ARRAY+=("$ip")
                  done
                fi
              done <<< "$PODS"
              
              # Unique IPs
              UNIQUE_IPS=$(printf "%s\n" "${IP_ARRAY[@]}" | sort -u | tr '\n' ' ' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
              
              if [ -z "$UNIQUE_IPS" ]; then
                echo "No external IPs found for sam-hub nodes."
                exit 0
              fi
        
              OLD_IPS=$(gcloud dns record-sets list --zone=${ENV_NAME} --project=${GCP_PROJECT_ID} --name="bootstrap.${ENV_NAME}.sam-mesh.dev." --type=A --format="value(rrdatas)" 2>/dev/null || true)
              OLD_IPS_CLEAN=$(echo $OLD_IPS | tr ';' '\n' | sort -u | tr '\n' ' ' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

              if [ "$UNIQUE_IPS" == "$OLD_IPS_CLEAN" ] ; then
                echo "DNS records are already up to date. No changes needed."
                exit 0
              fi

              echo "DNS records changed! Updating..."
              echo "Updating DNS record bootstrap.${ENV_NAME}.sam-mesh.dev. with IPs: $UNIQUE_IPS"
              
              # Start transaction
              gcloud dns record-sets transaction start --zone=${ENV_NAME} --project=${GCP_PROJECT_ID}
              
              # Remove old A records if they exist
              if [ -n "$OLD_IPS" ]; then
                OLD_IPS_CLEAN_REMV=$(echo $OLD_IPS | tr ';' ' ')
                gcloud dns record-sets transaction remove --zone=${ENV_NAME} --project=${GCP_PROJECT_ID} --name="bootstrap.${ENV_NAME}.sam-mesh.dev." --type=A --ttl=300 $OLD_IPS_CLEAN_REMV || true
              fi
              
             
              # Add new A records
              gcloud dns record-sets transaction add --zone=${ENV_NAME} --project=${GCP_PROJECT_ID} --name="bootstrap.${ENV_NAME}.sam-mesh.dev." --type=A --ttl=300 $UNIQUE_IPS
               
              # Execute transaction
              gcloud dns record-sets transaction execute --zone=${ENV_NAME} --project=${GCP_PROJECT_ID}
          restartPolicy: OnFailure
