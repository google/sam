apiVersion: v1
kind: ConfigMap
metadata:
  name: sam-canary-openclaw-config-${ENV_NAME}
  namespace: sam-canary-${ENV_NAME}
data:
  sam-node.yaml: |
    version: "v1alpha1"
    attenuation:
      policies: []
      checks: []
      rules: []
    services:
      - type: mcp
        name: openclaw
        description: "OpenClaw AI Agent Gateway"
        # Register the OpenClaw local gateway as a mesh service
        target_url: "http://localhost:18789/mcp/events"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-canary-${ENV_NAME}
  namespace: sam-canary-${ENV_NAME}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openclaw-canary-${ENV_NAME}
  template:
    metadata:
      labels:
        app: openclaw-canary-${ENV_NAME}
    spec:
      serviceAccountName: sam-node-sa
      initContainers:
      - name: init-openclaw-config
        image: busybox:1.36.1
        command: ["sh", "-c", "mkdir -p /data && echo '{\"gateway\": {\"mode\": \"local\"}}' > /data/openclaw.json"]
        volumeMounts:
        - name: openclaw-data
          mountPath: /data
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:latest
        ports:
        - containerPort: 18789
          name: http-gateway
        env:
        - name: SAM_MCP_URL
          value: "http://127.0.0.1:8080/mcp/events"
        - name: OPENCLAW_STATE_DIR
          value: "/data"
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secret-${ENV_NAME}
              key: gateway-token
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secret-${ENV_NAME}
              key: gemini-api-key
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: openclaw-data
          mountPath: /data
        - name: dshm
          mountPath: /dev/shm
      - name: sam-node
        image: ghcr.io/google/sam-node:${IMAGE_TAG}
        args: 
          - "run"
          - "--config=/etc/sam/sam-node.yaml"
          - "--hub=https://${ENV_NAME}.sam-mesh.dev"
          - "--jwt-path=/var/run/secrets/tokens/sam-token"
          - "--api-token=secret-token"
          - "--bind-addr=127.0.0.1:8080"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: config-volume
          mountPath: /etc/sam
        - name: sam-token
          mountPath: /var/run/secrets/tokens
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: sam-canary-openclaw-config-${ENV_NAME}
      - name: openclaw-data
        emptyDir: {}
      - name: dshm
        emptyDir:
          medium: Memory
      - name: sam-token
        projected:
          sources:
          - serviceAccountToken:
              path: sam-token
              expirationSeconds: 3600
              audience: "sam-hub-audience"
