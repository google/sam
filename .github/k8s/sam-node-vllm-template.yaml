apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hf-cache-pvc-${ENV_NAME}
  namespace: sam-canary-${ENV_NAME}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sam-canary-vllm-config-${ENV_NAME}
  namespace: sam-canary-${ENV_NAME}
data:
  sam-node.yaml: |
    version: "v1alpha1"
    attenuation:
      policies: []
      checks: []
      rules: []
    services:
      - type: inference
        name: vllm-tpu
        description: "vLLM TPU Inference Service"
        target_url: "http://localhost:8000/v1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-canary-${ENV_NAME}
  namespace: sam-canary-${ENV_NAME}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-canary-${ENV_NAME}
  template:
    metadata:
      labels:
        app: vllm-canary-${ENV_NAME}
    spec:
      serviceAccountName: sam-node-sa
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: tpu-v5-lite-podslice
        cloud.google.com/gke-tpu-topology: "1x1"
      tolerations:
      - key: "google.com/tpu"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node.kubernetes.io/memory-pressure"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: vllm-tpu
        image: vllm/vllm-tpu:latest
        resources:
          requests:
            cpu: 1000m
            memory: 16Gi
            google.com/tpu: "1"
          limits:
            google.com/tpu: "1"
        command: ["/bin/bash", "-c"]
        args:
        - |
          python3 -m vllm.entrypoints.openai.api_server \
            --model google/gemma-2-2b-it \
            --tensor-parallel-size 1 \
            --max-model-len 2048 \
            --enforce-eager \
            --host 0.0.0.0 \
            --port 8000 \
            --trust-remote-code
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: vllm-secret-${ENV_NAME}
              key: hf-token
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: hf-cache
          mountPath: /root/.cache/huggingface
      - name: sam-node
        image: ghcr.io/google/sam-node:${IMAGE_TAG}
        args: 
          - "run"
          - "--config=/etc/sam/sam-node.yaml"
          - "--hub=https://${ENV_NAME}.sam-mesh.dev"
          - "--jwt-path=/var/run/secrets/tokens/sam-token"
          - "--api-token=secret-token"
          - "--bind-addr=127.0.0.1:8080"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: config-volume
          mountPath: /etc/sam
        - name: sam-token
          mountPath: /var/run/secrets/tokens
          readOnly: true
      volumes:
      - name: hf-cache
        persistentVolumeClaim:
          claimName: hf-cache-pvc-${ENV_NAME}
      - name: config-volume
        configMap:
          name: sam-canary-vllm-config-${ENV_NAME}
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
      - name: sam-token
        projected:
          sources:
          - serviceAccountToken:
              path: sam-token
              expirationSeconds: 3600
              audience: "sam-hub-audience"
