name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
   publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
    timeout-minutes: 100
    
    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Hub
      id: meta-hub
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
      with:
        images: ${{ env.REGISTRY }}/google/sam-hub

    - name: Build and push Hub image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.sam-hub
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ steps.meta-hub.outputs.tags }}
          ${{ env.REGISTRY }}/google/sam-hub:stable
        labels: ${{ steps.meta-hub.outputs.labels }}

    - name: Extract metadata for Node
      id: meta-node
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
      with:
        images: ${{ env.REGISTRY }}/google/sam-node

    - name: Build and push Node image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.sam-node
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ steps.meta-node.outputs.tags }}
          ${{ env.REGISTRY }}/google/sam-node:stable
        labels: ${{ steps.meta-node.outputs.labels }}