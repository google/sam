name: Python SDK Test

on:
  push:
    branches: [ main ]
    paths:
      - 'sam-mcp-python/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'sam-mcp-python/**'

jobs:
  test_python:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Run Python unit tests
      run: make test-python

