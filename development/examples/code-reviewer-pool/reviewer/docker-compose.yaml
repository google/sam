# Runs a sam-node (pulled from the internet) plus the Gemini-backed code-reviewer.
# Copy .env.example to .env and fill in the values before `docker compose up`.
services:
  code-reviewer:
    # Your private GHCR image. `docker compose build` tags it here so you can push it.
    image: ${CODE_REVIEWER_IMAGE:-ghcr.io/kaisoz/gemini-code-reviewer-mcp:latest}
    build: .
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in .env}
      GEMINI_CLI_TRUST_WORKSPACE: "true"
    expose:
      - "7779"

  sam-node:
    image: ${SAM_NODE_IMAGE:-ghcr.io/google/sam-node:latest}
    depends_on:
      - code-reviewer
    command:
      - run
      - --data-dir=/data
      - --bind-addr=0.0.0.0:8080
      - --api-token=${SAM_API_TOKEN:?set SAM_API_TOKEN in .env}
      - --config=/config/sam-node.yaml
    volumes:
      - ./sam-node.yaml:/config/sam-node.yaml:ro
      - ${SAM_DATA_DIR:-./sam-data}:/data   # your pre-enrolled identity folder
    ports:
      - "8080:8080"       # control-plane / MCP API
      - "5001:5001/udp"   # libp2p
      - "5002:5002"       # libp2p
