apiVersion: v1
kind: Service
metadata:
  name: sam-control-plane
  namespace: ${NAMESPACE}
spec:
  type: ClusterIP
  selector:
    app: sam-control-plane
  ports:
  - { name: http, port: 8080, targetPort: 8080, protocol: TCP }
---
apiVersion: v1
kind: Service
metadata:
  name: sam-db
  namespace: ${NAMESPACE}
spec:
  type: ClusterIP
  selector:
    app: sam-db
  ports:
  - { name: postgres, port: 5432, targetPort: 5432, protocol: TCP }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sam-db
  namespace: ${NAMESPACE}
spec:
  serviceName: sam-db
  replicas: 1
  selector:
    matchLabels:
      app: sam-db
  template:
    metadata:
      labels:
        app: sam-db
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_DB
          value: sam_mesh
        - name: POSTGRES_USER
          value: sam
        - name: POSTGRES_PASSWORD
          value: sam-secret-password
        ports:
        - containerPort: 5432
          protocol: TCP
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: db-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-control-plane
  namespace: ${NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sam-control-plane
  template:
    metadata:
      labels:
        app: sam-control-plane
    spec:
      nodeSelector:
        sam-role: hub
      containers:
      - name: sam-control-plane
        image: sam-control-plane:${IMAGE_TAG}
        imagePullPolicy: IfNotPresent
        args:
        - "--bind-address=0.0.0.0:8080"
        - "--db-driver=postgres"
        - "--db-dsn=postgres://sam:sam-secret-password@sam-db:5432/sam_mesh?sslmode=disable"
        - "--issuer=${CONTROL_PLANE_ISSUERS}"
        - "--allowed-audiences=${ALLOWED_AUDIENCES}"
        - "--policy-file=/etc/sam/policies/policies.yaml"
        - "--insecure-skip-tls-verify"
        - "--admin-token=super-secret-admin-token"
        ports:
        - { containerPort: 8080, name: http, protocol: TCP }
        readinessProbe:
          httpGet:
            path: /info
            port: http
          periodSeconds: 2
        volumeMounts:
        - name: policies-volume
          mountPath: /etc/sam/policies
          readOnly: true
      volumes:
      - name: policies-volume
        configMap:
          name: sam-control-plane-policies
---
# Host-facing access for a locally-built sam-node. Reachable on the host at
# 127.0.0.1:9090 via the control-plane extraPortMappings.
apiVersion: v1
kind: Service
metadata:
  name: sam-control-plane-nodeport
  namespace: ${NAMESPACE}
spec:
  type: NodePort
  selector:
    app: sam-control-plane
  ports:
  - { name: http, port: 8080, targetPort: 8080, nodePort: 30090, protocol: TCP }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sam-control-plane-policies
  namespace: ${NAMESPACE}
data:
  policies.yaml: |
    version: "v1alpha1"
    bindings:
      - members: ["user:system:serviceaccount:${NAMESPACE}:node-a-sa"]
        role: "sam-admin"
      - members: ["user:system:serviceaccount:${NAMESPACE}:node-b-sa"]
        role: "sam-admin"
      - members: ["user:system:serviceaccount:${NAMESPACE}:node-c-sa"]
        role: "sam-admin"
      - members: ["user:system:serviceaccount:${NAMESPACE}:local-node-sa"]
        role: "sam-admin"
      - members: ["user:system:serviceaccount:${NAMESPACE}:sam-box-sa"]
        role: "sam:role:sambox"
      - members: ["group:routers", "user:system:serviceaccount:${NAMESPACE}:sam-router-sa"]
        role: "sam:role:router"
    roles:
      sam-admin:
        allowed_services:
          - "*"
        allowed_targets:
          - "*"
      "sam:role:sambox":
        allowed_services:
          - "*"
        allowed_targets:
          - "*"
      "sam:role:router":
        allowed_services:
          - "*"
        allowed_targets:
          - "*"
