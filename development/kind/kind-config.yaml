kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    # Expose the hub to the host (via the sam-hub-nodeport NodePort) so a
    # locally-built sam-node can enroll: host:9090->HTTP, host:4001->libp2p TCP.
    extraPortMappings:
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      - containerPort: 30401
        hostPort: 4001
        protocol: TCP
  - role: worker
    labels:
      sam-role: hub
  - role: worker
    labels:
      sam-role: node-a
  - role: worker
    labels:
      sam-role: node-b
  - role: worker
    labels:
      sam-role: node-c
  - role: worker
    labels:
      sam-role: node-d
  - role: worker
    labels:
      sam-role: node-e
