apiVersion: v1
kind: ServiceAccount
metadata:
  name: sam-router-sa
  namespace: ${NAMESPACE}
---
apiVersion: v1
kind: Service
metadata:
  name: sam-router
  namespace: ${NAMESPACE}
spec:
  type: ClusterIP
  selector:
    app: sam-router
  ports:
  - { name: p2p-tcp, port: 4501, targetPort: 4501, protocol: TCP }
  - { name: p2p-udp, port: 4501, targetPort: 4501, protocol: UDP }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sam-router
  namespace: ${NAMESPACE}
spec:
  serviceName: "sam-router"
  replicas: 1
  selector:
    matchLabels:
      app: sam-router
  template:
    metadata:
      labels:
        app: sam-router
    spec:
      serviceAccountName: sam-router-sa
      nodeSelector:
        sam-role: hub
      containers:
      - name: sam-router
        image: sam-router:${IMAGE_TAG}
        imagePullPolicy: IfNotPresent
        ports:
        - { containerPort: 4501, name: p2p-tcp, protocol: TCP }
        - { containerPort: 4501, name: p2p-udp, protocol: UDP }
        args:
        - "--control-plane=http://sam-control-plane.${NAMESPACE}.svc.cluster.local:8080"
        - "--listen=/ip4/0.0.0.0/tcp/4501"
        - "--listen=/ip4/0.0.0.0/udp/4501/quic-v1"
        - "--external-addr=/dns4/sam-router.${NAMESPACE}.svc.cluster.local/tcp/4501"
        - "--external-addr=/ip4/127.0.0.1/tcp/4001"
        - "--jwt-path=/var/run/secrets/tokens/sam-token"
        - "--keys-path=/data/router.key"
        - "--allow-loopback"
        volumeMounts:
        - name: sam-token
          mountPath: /var/run/secrets/tokens
          readOnly: true
        - name: router-data
          mountPath: /data
      volumes:
      - name: sam-token
        projected:
          sources:
          - serviceAccountToken:
              path: sam-token
              expirationSeconds: 3600
              audience: "sam-hub-audience"
      - name: router-data
        emptyDir: {}
---
# Host-facing access for a locally-built sam-node. Reachable on the host at
# 127.0.0.1:4001 via the control-plane extraPortMappings.
apiVersion: v1
kind: Service
metadata:
  name: sam-router-nodeport
  namespace: ${NAMESPACE}
spec:
  type: NodePort
  selector:
    app: sam-router
  ports:
  - { name: p2p-tcp, port: 4501, targetPort: 4501, nodePort: 30401, protocol: TCP }
