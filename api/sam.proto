syntax = "proto3";
package sam.v1;
option go_package = "github.com/google/sam/api";



message AuthFrame {
  bytes biscuit = 1;
  string target_service = 2; // Optional: specific service requested
}

message AuthResponse {
  bool success = 1;
  string error = 2; // populated only if success is false
  bytes biscuit = 3; // The server's own Biscuit token (for mutual auth)
}



message MeshEvent {
  enum Type {
    BANNED = 0;
    KEY_ROTATION = 1;
  }
  Type type = 1;
  string peer_id = 2;
  int64 timestamp = 3;
  bytes new_public_key = 4;
  bytes signature = 5;
}

message EnrollRequest {
  string jwt = 1;
  string peer_id = 2;
  bytes public_key = 3;
  string requested_role = 4;
}

message EnrollResponse {
  bytes biscuit_token = 1;
  string error_message = 2;
  bytes hub_public_key = 3;
  repeated string hub_addresses = 4;
  int64 expiration = 5;
}

message EnrollmentStatusRequest {
  string peer_id = 1;
}

enum EnrollmentStatus {
  ENROLLMENT_STATUS_UNSPECIFIED = 0;
  ENROLLMENT_STATUS_PENDING = 1;
  ENROLLMENT_STATUS_APPROVED = 2;
  ENROLLMENT_STATUS_REJECTED = 3;
}

message BootstrapEnrollRequest {
  string bootstrap_token = 1;
  string peer_id = 2;
  bytes public_key = 3;
  string requested_role = 4;
}

message BootstrapEnrollResponse {
  EnrollmentStatus status = 1;
  bytes biscuit_token = 2;         // Populated only if APPROVED
  int32 poll_interval_seconds = 3; // Recommended polling wait time
  string error_message = 4;
  bytes hub_public_key = 5;         // Populated only if APPROVED
  repeated string hub_addresses = 6; // Populated only if APPROVED
  int64 expiration = 7;             // Populated only if APPROVED
}



enum ServiceType {
  SERVICE_TYPE_UNSPECIFIED = 0;
  SERVICE_TYPE_MCP = 1;
  SERVICE_TYPE_INFERENCE = 2;
}

message ServiceInfo {
  ServiceType type = 1;
  string name = 2;
  string description = 3;
}

message CommandBackend {
  repeated string command = 1;
  map<string, string> env = 2;
}

message RegisterServiceRequest {
  ServiceInfo service = 1;
  oneof backend {
    string target_url = 2;
    CommandBackend command = 3;
  }
}

message DiscoveredProvider {
  string peer_id = 1;
  string local_proxy_url = 2;
  string srv_name = 3;
  string srv_description = 4;
}

message HubInfoResponse {
  string oidc_issuer = 1;
  string client_id = 2;
  string audience = 3;
  repeated string hub_addresses = 4;
}

message RouterLeaseRequest {
  string peer_id = 1;
  repeated string addresses = 2;
  bytes biscuit = 3;
}

message RouterLeaseResponse {
  bool success = 1;
  string error = 2;
  int64 expires_at = 3;
}

message PolicyConfigGetRequest {}

message PolicyConfigGetResponse {
  string yaml_content = 1;
}

message PolicyConfigUpdateRequest {
  string yaml_content = 1;
}

message PolicyConfigUpdateResponse {
  bool success = 1;
  string error = 2;
}

message KeysResponse {
  repeated bytes public_keys = 1;
}

message TokenRefreshRequest {
  bytes challenge_signature = 1;
  int64 timestamp = 2;
}

message TokenRefreshResponse {
  bytes biscuit_token = 1;
  int64 expires_at = 2;
  string error_message = 3;
}

message TokenRevokeRequest {
  string peer_id = 1;
}

message TokenRevokeResponse {
  bool success = 1;
  string error = 2;
}



