syntax = "proto3";
package sam.v1;
option go_package = "github.com/google/sam/api";



message AuthFrame {
  bytes biscuit = 1;
}

message AuthResponse {
  bool success = 1;
  string error = 2; // populated only if success is false
}



message MeshEvent {
  enum Type {
    JOIN = 0;
    EXIT = 1;
    BANNED = 2;
    KEY_ROTATION = 3;
  }
  Type type = 1;
  string peer_id = 2;
  int64 timestamp = 3;
  bytes new_public_key = 4;
  bytes signature = 5;
}

message EnrollRequest {
  string jwt = 1;
  string peer_id = 2;
}

message EnrollResponse {
  bytes biscuit_token = 1;
  string error_message = 2;
  bytes hub_public_key = 3;
  repeated string hub_addresses = 4;
  int64 expiration = 5;
  repeated string known_peers = 6;
}

enum ServiceType {
  SERVICE_TYPE_UNSPECIFIED = 0;
  SERVICE_TYPE_MCP = 1;
  SERVICE_TYPE_INFERENCE = 2;
  SERVICE_TYPE_A2A = 3;
}

message ServiceInfo {
  ServiceType type = 1;
  string name = 2;
  string description = 3;
}

message CommandBackend {
  repeated string command = 1;
  map<string, string> env = 2;
}

message RegisterServiceRequest {
  ServiceInfo service = 1;
  oneof backend {
    string target_url = 2;
    CommandBackend command = 3;
  }
}

message DiscoveredProvider {
  string peer_id = 1;
  string local_proxy_url = 2;
  string srv_name = 3;
  string srv_description = 4;
}

message HubInfoResponse {
  string oidc_issuer = 1;
  string client_id = 2;
  string audience = 3;
}
