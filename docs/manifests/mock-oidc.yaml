apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-oidc-script
data:
  server.py: |
    import json
    import time
    import jwt
    from http.server import BaseHTTPRequestHandler, HTTPServer

    PRIVATE_KEY = """-----BEGIN PRIVATE KEY-----
    MIIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQDGtPD85uaT342Y
