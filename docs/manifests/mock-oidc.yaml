    IqNKTt9jbR4zISCpyOCsQw==
    -----END PRIVATE KEY-----"""

    JWKS = {
      "keys": [
        {
          "kty": "RSA",
          "alg": "RS256",
          "use": "sig",
          "kid": "test-key-id",
          "n": "xrTw_Obmk9-NmMqhgIlkOjldgcb6V0ETM7G-1aXS2teOsX-f9W_ZSEeHRb4bxlKp8sxS1dBHSM06qMcihh20GOvAyFIx94sLeq81NFZMP94P0f0wRJhsHajQywgSLbCzpxeB37MQFrY2lEfekuKF2glHFzg_98h7NIWuLbvGIMBsDB2vwkEYHE1-RbIUerh6MORuzYjlWFHAD3NR15sJn9BXkmPa9ELnZiI5CUniB9SPwbn6RKm3I60so2HeHpXW4Y5Qr7iEfd0r2vI2Qc3QlvscclPvHc9rRIEY5vRuwqaAqQMIXBEEFu10VG_Az_fm4nfVX0_twtU3urvHqMJ3Vw",
          "e": "AQAB"
        }
      ]
    }

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == '/.well-known/openid-configuration':
                body = {
                    'issuer': 'http://mock-oidc:18080',
                    'authorization_endpoint': 'http://mock-oidc:18080/auth',
                    'token_endpoint': 'http://mock-oidc:18080/token',
                    'jwks_uri': 'http://mock-oidc:18080/keys'
                }
                data = json.dumps(body).encode('utf-8')
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.send_header('Content-Length', str(len(data)))
                self.end_headers()
                self.wfile.write(data)
                return
            if self.path == '/keys':
                data = json.dumps(JWKS).encode('utf-8')
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.send_header('Content-Length', str(len(data)))
                self.end_headers()
                self.wfile.write(data)
                return
            self.send_response(200)
            self.end_headers()
            self.wfile.write(b'ok')

        def do_POST(self):
            if self.path == '/token':
                payload = {
                    'iss': 'http://mock-oidc:18080',
                    'aud': 'sam-e2e',
                    'sub': 'test-user',
                    'exp': int(time.time()) + 3600,
                    'roles': ['admin', 'user']
                }
                token = jwt.encode(payload, PRIVATE_KEY, algorithm='RS256', headers={'kid': 'test-key-id'})
                body = {
                    'access_token': token,
                    'token_type': 'Bearer',
                    'expires_in': 3600
                }
                data = json.dumps(body).encode('utf-8')
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.send_header('Content-Length', str(len(data)))
                self.end_headers()
                self.wfile.write(data)
                return
            self.send_response(404)
            self.end_headers()

    print("Mock OIDC server ready", flush=True)
    HTTPServer(('0.0.0.0', 18080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-oidc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-oidc
  template:
    metadata:
      labels:
        app: mock-oidc
    spec:
      containers:
      - name: mock-oidc
        image: python:3.12
        command: ["sh", "-c", "pip install pyjwt cryptography && python /app/server.py"]
        volumeMounts:
        - name: script-volume
          mountPath: /app
      volumes:
      - name: script-volume
        configMap:
          name: mock-oidc-script
---
apiVersion: v1
kind: Service
metadata:
  name: mock-oidc
spec:
  type: LoadBalancer
  ports:
  - port: 18080
    targetPort: 18080
  selector:
    app: mock-oidc
