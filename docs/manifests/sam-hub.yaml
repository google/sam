apiVersion: v1
kind: Secret
metadata:
  name: sam-hub-secret
type: Opaque
stringData:
  SAM_HUB_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef" # 32-byte hex
  SAM_OIDC_ISSUER: "http://mock-oidc:18080"
  SAM_OIDC_ID: "sam-e2e"
  SAM_OIDC_SECRET: "sam-e2e-secret"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-hub
  labels:
    app: sam-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sam-hub
  template:
    metadata:
      labels:
        app: sam-hub
    spec:
      containers:
      - name: sam-hub
        image: sam-hub:local
        imagePullPolicy: IfNotPresent
        args:
        - "--mesh=public-mesh"
        - "--issuer=$(SAM_OIDC_ISSUER)"
        ports:
        - containerPort: 8080
          name: public-port
        env:
        - name: SAM_HUB_KEY
          valueFrom:
            secretKeyRef:
              name: sam-hub-secret
              key: SAM_HUB_KEY
        - name: SAM_OIDC_ISSUER
          valueFrom:
            secretKeyRef:
              name: sam-hub-secret
              key: SAM_OIDC_ISSUER
        - name: SAM_OIDC_ID
          valueFrom:
            secretKeyRef:
              name: sam-hub-secret
              key: SAM_OIDC_ID
        - name: SAM_OIDC_SECRET
          valueFrom:
            secretKeyRef:
              name: sam-hub-secret
              key: SAM_OIDC_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: sam-hub
spec:
  type: LoadBalancer
  selector:
    app: sam-hub
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
    name: public-port

